<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>技术支持 | RWoody Labs</title>
  <meta name="description" content="Get technical support for apps published by RWoody Labs.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell inner-page">
    <a class="back-link" href="/index.html">返回首页</a>
    <section class="page-header">
      <p class="eyebrow">Support</p>
      <h1>技术支持</h1>
      <p class="lead">如果你在使用我们的 App 时遇到问题，可以通过下面的方式联系 RWoody Labs。</p>
    </section>

    <section class="grid single">
      <article class="card">
        <h2>联系渠道</h2>
        <p>支持邮箱：<a href="mailto:support@rwoodylabs.org">support@rwoodylabs.org</a></p>
        <p>建议在邮件中附上设备型号、系统版本、问题截图和复现步骤，我们会更快定位问题。</p>
      </article>

      <article class="card">
        <h2>响应时间</h2>
        <p>工作日通常会在 2 个工作日内回复。复杂问题可能需要更长排查时间。</p>
      </article>

      <article class="card">
        <h2>常见问题</h2>
        <p><strong>应用无法打开：</strong>请先确认系统版本满足要求，并尝试重新启动应用。</p>
        <p><strong>地图或网络功能异常：</strong>请检查网络连接是否稳定，或稍后重试。</p>
        <p><strong>数据同步异常：</strong>请提供问题发生时间和账号信息，便于我们排查日志。</p>
      </article>
    </section>
  </main>
</body>
</html>
